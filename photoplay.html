function PhotoPlay() {
  const [view, setView] = useState('title');
  const [activeIndex, setActiveIndex] = useState(0);
  const [transitioning, setTransitioning] = useState(false);

  useEffect(() => {
    const link = document.createElement('link');
    link.href = 'https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap';
    link.rel = 'stylesheet';
    document.head.appendChild(link);
    return () => {
      try { document.head.removeChild(link); } catch (e) {}
    };
  }, []);

  const goTo = (next, idx = null) => {
    setTransitioning(true);
    setTimeout(() => {
      if (idx !== null) setActiveIndex(idx);
      setView(next);
      setTransitioning(false);
    }, 180);
  };

  // Shuffle-bag for random selection. Uniform Math.random() across 17 prompts
  // clusters and repeats in ways that feel obviously unrandom to humans. A
  // shuffle-bag deals each prompt once before reshuffling, which is what people
  // perceive as fair randomness. Stored in a ref so draws don't trigger renders.
  const bagRef = useRef([]);

  const refillBag = (excludeFirst = -1) => {
    const arr = Array.from({ length: prompts.length }, (_, i) => i);
    // Fisher-Yates shuffle
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    // Prevent the new bag's first item being the same as what's currently shown
    if (excludeFirst !== -1 && arr[0] === excludeFirst && arr.length > 1) {
      [arr[0], arr[1]] = [arr[1], arr[0]];
    }
    bagRef.current = arr;
  };

  const drawFromBag = (excludeIndex = -1) => {
    if (bagRef.current.length === 0) {
      refillBag(excludeIndex);
    }
    const next = bagRef.current[0];
    bagRef.current = bagRef.current.slice(1);
    return next;
  };

  const surprise = () => {
    const exclude = view === 'detail' ? activeIndex : -1;
    const i = drawFromBag(exclude);
    goTo('detail', i);
  };

  const nextRandom = () => {
    const i = drawFromBag(activeIndex);
    goTo('detail', i);
  };

  const palette = {
    paper: '#FFF6F3',        // pp-blush — main background
    paperDeep: '#FBECEC',    // pp-pink-cream-2 — slightly lighter variant
    pinkCream: '#F7DEDE',    // pp-pink-cream
    ink: '#3A3A40',          // pp-ink — body text
    inkSoft: '#55555C',      // pp-ink-soft
    accent: '#D02070',       // pp-magenta — primary accent
    accentHover: '#A8185A',  // pp-magenta-hover
    accentDeep: '#8A0F47',   // pp-magenta-ink
    rule: '#6C6C74',         // pp-grey-dark — dividers, secondary
  };

  // Per-prompt colour schemes for the detail view, cycled by index.
  const detailThemes = [
    { bg: '#D02070', text: '#FFFFFF', accent: '#FFFFFF', rule: 'rgba(255,255,255,0.55)', illoBg: 'rgba(255,255,255,0.08)' },     // magenta on white text
    { bg: '#FFF6F3', text: '#3A3A40', accent: '#D02070', rule: '#6C6C74', illoBg: 'transparent' },                                // blush on dark grey text
    { bg: '#FFFFFF', text: '#8A0F47', accent: '#D02070', rule: '#A8A8B0', illoBg: 'transparent' },                                // white on deep magenta text
  ];

  const currentTheme = view === 'detail' ? detailThemes[activeIndex % detailThemes.length] : null;
  const currentBg = currentTheme ? currentTheme.bg : palette.paper;

  const fontDisplay = `'Quicksand', 'Helvetica Neue', sans-serif`;
  const fontBody = `'Nunito', 'Helvetica Neue', sans-serif`;

  return (
    <div
      style={{
        backgroundColor: currentBg,
        color: palette.ink,
        fontFamily: fontBody,
        minHeight: '100vh',
        width: '100%',
        transition: 'background-color 280ms ease',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      <style>{`
        .pp-link-quiet { color: inherit; text-decoration: none; transition: color 200ms ease; }
        .pp-link-quiet:hover { color: ${palette.accent}; }
      `}</style>
      <div
        style={{
          maxWidth: 440,
          margin: '0 auto',
          padding: '32px 28px 48px',
          opacity: transitioning ? 0 : 1,
          transform: transitioning ? 'translateY(6px)' : 'translateY(0)',
          transition: 'opacity 180ms ease, transform 180ms ease',
        }}
      >
        {view === 'title' && (
          <TitleView
            palette={palette}
            fontDisplay={fontDisplay}
            fontBody={fontBody}
            onBrowse={() => goTo('index')}
            onSurprise={surprise}
          />
        )}

        {view === 'index' && (
          <IndexView
            palette={palette}
            fontDisplay={fontDisplay}
            fontBody={fontBody}
            prompts={prompts}
            onPick={(i) => goTo('detail', i)}
            onBack={() => goTo('title')}
            onSurprise={surprise}
          />
        )}

        {view === 'detail' && (
          <DetailView
            palette={palette}
            theme={currentTheme}
            fontDisplay={fontDisplay}
            fontBody={fontBody}
            prompt={prompts[activeIndex]}
            index={activeIndex}
            total={prompts.length}
            onBack={() => goTo('index')}
            onAnother={nextRandom}
          />
        )}
      </div>
    </div>
  );
}

function DetailView({ palette, theme, fontDisplay, fontBody, prompt, index, total, onBack, onAnother }) {
  const Ill = prompt.Illustration;
  const lines = prompt.body.split('\n');
  const t = theme || { bg: palette.paper, text: palette.ink, accent: palette.accent, rule: palette.rule };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
        <button
          onClick={onBack}
          style={{
            background: 'transparent',
            border: 'none',
            color: t.rule,
            fontFamily: fontDisplay,
            fontSize: 13,
            letterSpacing: '0.16em',
            textTransform: 'uppercase',
            cursor: 'pointer',
            padding: 0,
          }}
        >
          ← Index
        </button>
        <div
          style={{
            fontFamily: fontDisplay,
            fontSize: 13,
            letterSpacing: '0.16em',
            textTransform: 'uppercase',
            color: t.rule,
          }}
        >
          {String(index + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
        </div>
      </div>

      <div
        style={{
          width: '100%',
          aspectRatio: '1 / 1',
          maxWidth: 240,
          margin: '8px auto 24px',
          color: t.accent,
        }}
      >
        <Ill />
      </div>

      <h2
        style={{
          fontFamily: fontBody,
          fontStyle: 'italic',
          fontSize: 40,
          margin: 0,
          marginBottom: 22,
          fontWeight: 400,
          letterSpacing: '-0.015em',
          lineHeight: 1.05,
          textAlign: 'center',
          color: t.text,
        }}
      >
        {prompt.title}
      </h2>

      <div
        style={{
          height: 1,
          background: t.rule,
          margin: '0 auto 24px',
          width: 60,
        }}
      />

      <div
        style={{
          fontFamily: fontBody,
          fontSize: 17,
          lineHeight: 1.6,
          marginBottom: 36,
          color: t.text,
        }}
      >
        {lines.map((line, idx) => {
          if (line.trim().startsWith('•')) {
            return (
              <div
                key={idx}
                style={{
                  paddingLeft: 18,
                  textIndent: -18,
                  marginBottom: 4,
                  fontStyle: 'italic',
                  color: t.text,
                }}
              >
                {line}
              </div>
            );
          }
          if (line.trim() === '') {
            return <div key={idx} style={{ height: 12 }} />;
          }
          return (
            <p key={idx} style={{ margin: 0, marginBottom: 8 }}>
              {line}
            </p>
          );
        })}
      </div>

      <button
        onClick={onAnother}
        style={{
          display: 'block',
          width: '100%',
          padding: '16px 20px',
          backgroundColor: 'transparent',
          color: t.accent,
          border: `1px solid ${t.accent}`,
          borderRadius: 999,
          fontFamily: fontBody,
          fontStyle: 'italic',
          fontSize: 16,
          cursor: 'pointer',
          marginBottom: 10,
        }}
      >
        Another at random ↗︎
      </button>

      <button
        onClick={onBack}
        style={{
          display: 'block',
          width: '100%',
          padding: '16px 20px',
          backgroundColor: 'transparent',
          color: t.text,
          border: 'none',
          fontFamily: fontDisplay,
          fontSize: 14,
          letterSpacing: '0.12em',
          textTransform: 'uppercase',
          cursor: 'pointer',
        }}
      >
        ← Back to all prompts
      </button>
    </div>
  );
}
